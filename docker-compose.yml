version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules

